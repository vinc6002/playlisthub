<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>PlaylistHub</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#161920">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PlaylistHub">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14; --surface: #161920; --surface2: #1e222c; --surface3: #262b38;
  --border: #2a3040; --text: #e8eaf0; --text2: #8b92a5;
  --accent: #f25c54; --accent2: #ff8a65; --green: #4caf84;
  --blue: #5b8def; --yellow: #f0c040; --danger: #e53935;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

[data-theme="midnight"] { --bg:#0d0f14;--surface:#161920;--surface2:#1e222c;--surface3:#262b38;--border:#2a3040;--text:#e8eaf0;--text2:#8b92a5;--accent:#f25c54;--accent2:#ff8a65; }
[data-theme="ocean"] { --bg:#0a1628;--surface:#0f1f3d;--surface2:#162a4a;--surface3:#1d3557;--border:#264573;--text:#e0e8f0;--text2:#7a9cc6;--accent:#00b4d8;--accent2:#48cae4; }
[data-theme="forest"] { --bg:#0c1a0e;--surface:#142016;--surface2:#1b2e1e;--surface3:#243826;--border:#2f4a32;--text:#dce8dd;--text2:#7da07f;--accent:#4caf84;--accent2:#81c784; }
[data-theme="purple"] { --bg:#120e1c;--surface:#1a1428;--surface2:#241c36;--surface3:#2e2444;--border:#3d3260;--text:#e4dff0;--text2:#9688b8;--accent:#b388ff;--accent2:#ce93d8; }
[data-theme="light"] { --bg:#f0f2f5;--surface:#ffffff;--surface2:#f5f6f8;--surface3:#ebedf0;--border:#d4d8de;--text:#1a1a2e;--text2:#6b7280;--accent:#e53935;--accent2:#ff7043; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  line-height: 1.4; transition: background 0.3s, color 0.3s;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* ===== MOBILE HEADER ===== */
.m-header {
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: relative; z-index: 50;
  height: 48px;
}

.m-header .logo-zone {
  display: flex; align-items: center; gap: 8px;
}

.m-header .logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.api-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text2); transition: background 0.3s;
  flex-shrink: 0;
}

.api-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(76,175,132,0.5); }

.m-header .header-actions {
  display: flex; align-items: center; gap: 8px;
}

.quota-mini {
  font-size: 0.65rem; color: var(--text2);
  display: flex; align-items: center; gap: 4px;
}

.quota-mini-bar {
  width: 32px; height: 3px; background: var(--surface3);
  border-radius: 2px; overflow: hidden;
}

.quota-mini-fill {
  height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s;
}

.quota-mini-fill.warn { background: var(--yellow); }
.quota-mini-fill.danger { background: var(--accent); }

.icon-btn {
  background: none; border: none; color: var(--text2);
  width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.icon-btn:active { background: var(--surface2); color: var(--text); }

/* ===== MAIN LAYOUT ===== */
.app-body {
  display: flex; flex-direction: column;
  height: calc(100vh - 48px - 56px - var(--safe-b));
  height: calc(100dvh - 48px - 56px - var(--safe-b));
}

/* ===== VIEWS ===== */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ===== LISTS VIEW ===== */
.lists-view { padding: 12px 16px; overflow-y: auto; flex: 1; }

.lists-view .section-title {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text2); margin-bottom: 10px;
}

.m-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 12px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 6px; cursor: pointer;
  transition: all 0.15s; position: relative;
  -webkit-tap-highlight-color: transparent;
}

.m-list-item:active { background: var(--surface2); transform: scale(0.98); }
.m-list-item.active { border-color: var(--accent); border-left: 3px solid var(--accent); }

.m-list-item .name { flex: 1; font-size: 0.9rem; font-weight: 500; }

.m-list-item .badge {
  font-size: 0.72rem; color: var(--text2); background: var(--surface2);
  padding: 3px 10px; border-radius: 10px; min-width: 28px; text-align: center;
}

.m-list-item .item-actions {
  display: flex; gap: 2px;
}

.m-list-item .item-actions button {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 0.85rem; padding: 4px 6px; border-radius: 6px;
}

.m-list-item .item-actions button:active { background: var(--surface3); }

.add-list-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 10px;
  font-family: inherit; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; margin-top: 8px;
}

.add-list-btn:active { opacity: 0.85; }

/* ===== VIDEOS VIEW ===== */
.videos-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.videos-header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}

.videos-header-top h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}

.add-input-row {
  display: flex; gap: 6px;
}

.add-input-row input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: 8px;
  font-size: 0.82rem; font-family: inherit;
  min-width: 0;
}

.add-input-row input::placeholder { color: var(--text2); }

.add-input-row button {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 8px;
  padding: 8px 14px; font-family: inherit; font-size: 0.82rem;
  font-weight: 600; cursor: pointer; white-space: nowrap;
}

.add-input-row button:active { opacity: 0.85; }

/* Sources collapsible */
.sources-section {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.sources-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.sources-toggle .label {
  font-size: 0.72rem; color: var(--text2); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.8px;
}

.sources-toggle .chevron {
  font-size: 0.8rem; color: var(--text2); transition: transform 0.2s;
}

.sources-toggle .chevron.open { transform: rotate(180deg); }

.sources-body {
  padding: 0 12px 10px;
  display: flex; flex-wrap: wrap; gap: 5px;
  max-height: 0; overflow: hidden;
  transition: max-height 0.25s ease, padding 0.25s ease;
}

.sources-body.open {
  max-height: 300px;
  padding: 4px 12px 10px;
}

.m-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 8px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 0.7rem; color: var(--text2); transition: all 0.15s;
}

.m-chip.active-filter { border-color: var(--blue); background: rgba(91,141,239,0.12); color: var(--blue); }

.m-chip .chip-name { cursor: pointer; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-chip .chip-count { opacity: 0.5; font-size: 0.65rem; }

.m-chip button {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 0.8rem; padding: 0; line-height: 1;
}

.m-chip button:active { color: var(--accent); }

/* Toolbar */
.m-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.m-toolbar .info {
  font-size: 0.72rem; color: var(--text2); white-space: nowrap;
}

.m-toolbar .info strong { color: var(--text); }

.m-toolbar .spacer { flex: 1; }

.m-toolbar input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 8px; border-radius: 6px;
  font-size: 0.75rem; width: 110px; font-family: inherit;
}

.m-toolbar input::placeholder { color: var(--text2); }

.m-toolbar select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 4px; border-radius: 6px;
  font-size: 0.72rem; font-family: inherit; cursor: pointer;
  max-width: 90px;
}

.m-toolbar select option { background: var(--surface2); }

.m-toolbar .refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 6px 8px; border-radius: 6px;
  font-size: 0.75rem; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}

.m-toolbar .refresh-btn:active { background: var(--surface3); color: var(--text); }

/* Video list */
.videos-scroll {
  flex: 1; overflow-y: auto; padding: 8px 10px;
  -webkit-overflow-scrolling: touch;
}

.m-video {
  display: flex; align-items: center; gap: 10px;
  padding: 8px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 4px; transition: all 0.15s;
}

.m-video:active { background: var(--surface2); }

.m-video .thumb {
  width: 96px; min-width: 96px; height: 54px;
  border-radius: 6px; overflow: hidden; position: relative; cursor: pointer;
}

.m-video .thumb img { width: 100%; height: 100%; object-fit: cover; }

.m-video .thumb .play-ov {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.3); display: flex;
  align-items: center; justify-content: center;
  opacity: 0;
}

.m-video:active .thumb .play-ov { opacity: 1; }
.play-ov svg { width: 24px; height: 24px; fill: #fff; }

.m-video .vinfo { flex: 1; min-width: 0; }

.m-video .vinfo .vtitle {
  font-size: 0.82rem; font-weight: 500; margin-bottom: 2px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  line-height: 1.3;
}

.m-video .vinfo .vtitle a { color: var(--text); text-decoration: none; }

.m-video .vinfo .vmeta { font-size: 0.68rem; color: var(--text2); line-height: 1.3; }

.m-video .vinfo .vtag {
  display: inline-block; font-size: 0.62rem;
  padding: 1px 5px; border-radius: 3px;
  background: var(--surface3); color: var(--blue); margin-top: 2px;
}

.m-video .seen-btn {
  background: var(--green); color: #fff; border: none;
  padding: 8px 10px; border-radius: 8px;
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  font-family: inherit; white-space: nowrap;
  min-width: 36px; text-align: center;
}

.m-video .seen-btn:active { opacity: 0.8; }

/* Compact mode */
[data-compact="true"] .m-video { padding: 5px 6px; gap: 8px; }
[data-compact="true"] .m-video .thumb { width: 72px; min-width: 72px; height: 40px; }
[data-compact="true"] .m-video .vinfo .vtitle { font-size: 0.78rem; -webkit-line-clamp: 1; }
[data-compact="true"] .m-video .vinfo .vtag { display: none; }
[data-compact="true"] .videos-scroll { padding: 6px 8px; }
[data-compact="true"] .m-video { margin-bottom: 3px; }

[data-nothumbs="true"] .m-video .thumb { display: none; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  display: flex; align-items: stretch; justify-content: space-around;
  background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-b);
  height: 56px; position: relative; z-index: 50;
}

.nav-tab {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px;
  flex: 1; background: none; border: none; color: var(--text2);
  font-family: inherit; font-size: 0.62rem; font-weight: 500;
  cursor: pointer; transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  padding: 6px 0;
}

.nav-tab .nav-icon { font-size: 1.2rem; }
.nav-tab.active { color: var(--accent); }
.nav-tab:active { color: var(--text); }

/* ===== EMPTY STATE ===== */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text2); gap: 8px; padding: 32px; text-align: center;
}

.empty-state .icon { font-size: 2rem; opacity: 0.4; }
.empty-state p { font-size: 0.85rem; }

/* ===== MODALS ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(3px);
}

.modal-overlay.visible { display: flex; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px 18px 0 0; padding: 24px 20px;
  padding-bottom: calc(20px + var(--safe-b));
  width: 100%; max-width: 500px;
  box-shadow: var(--shadow);
  animation: sheetUp 0.25s ease;
}

@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal .sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--surface3); margin: 0 auto 16px;
}

.modal h3 { font-family: 'Playfair Display', serif; font-size: 1.05rem; margin-bottom: 4px; }
.modal .modal-desc { font-size: 0.8rem; color: var(--text2); margin-bottom: 16px; line-height: 1.4; }

.modal input[type="text"] {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); color: var(--text);
  padding: 12px; border-radius: 10px;
  font-size: 0.9rem; font-family: inherit; margin-bottom: 14px;
}

.modal-actions { display: flex; gap: 8px; }

.modal-actions .btn { flex: 1; justify-content: center; padding: 12px; border-radius: 10px; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border: none; border-radius: 8px; font-family: inherit; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--text2); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-small { padding: 6px 12px; font-size: 0.8rem; }

.confirm-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin-bottom: 12px;
  background: rgba(229,57,53,0.12);
}

/* ===== SETTINGS ===== */
.settings-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 250;
  backdrop-filter: blur(3px);
}

.settings-overlay.visible { display: block; }

.settings-panel {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 320px; max-width: 85vw;
  background: var(--surface); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 20px 16px;
  padding-bottom: calc(20px + var(--safe-b));
  animation: slideRight 0.25s ease;
  -webkit-overflow-scrolling: touch;
}

@keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

.settings-panel h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}

.settings-panel .close-btn { background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; padding: 4px; }

.setting-group { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.setting-group:last-child { border-bottom: none; }

.setting-group h4 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; }

.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 10px; }
.setting-row label { font-size: 0.82rem; }
.setting-row .sub { font-size: 0.7rem; color: var(--text2); margin-top: 1px; }

.toggle { position: relative; width: 38px; height: 20px; background: var(--surface3); border-radius: 10px; cursor: pointer; border: none; padding: 0; transition: background 0.2s; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle::after { content:''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle.on::after { transform: translateX(18px); }

.theme-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-top: 6px; }

.theme-swatch {
  aspect-ratio: 1; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}

.theme-swatch.active { border-color: var(--accent); transform: scale(1.06); }
.theme-swatch span { font-size: 0.55rem; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); font-weight: 600; }

/* API key in settings */
.api-key-setting input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: 8px;
  font-size: 0.78rem; font-family: monospace; margin-top: 6px;
}

.spinner { width: 16px; height: 16px; border: 2px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: calc(66px + var(--safe-b)); left: 16px; right: 16px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 16px; border-radius: 10px;
  font-size: 0.82rem; z-index: 300; box-shadow: var(--shadow);
  text-align: center;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
}

@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(10px); } }

/* Desktop overrides */
@media (min-width: 768px) {
  .bottom-nav { max-width: 500px; margin: 0 auto; }
  .modal { max-width: 420px; border-radius: 16px; margin-bottom: 40px; }
  .m-video .thumb { width: 120px; min-width: 120px; height: 68px; }
}
</style>
</head>
<body data-theme="midnight" data-compact="false" data-nothumbs="false">

<!-- HEADER -->
<div class="m-header">
  <div class="logo-zone">
    <span class="logo">PlaylistHub</span>
    <div class="api-dot" id="apiDot" title="API YouTube"></div>
  </div>
  <div class="header-actions">
    <div class="quota-mini" id="quotaZone">
      <span id="quotaText">—</span>
      <div class="quota-mini-bar"><div class="quota-mini-fill" id="quotaBar"></div></div>
    </div>
    <button class="icon-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- APP BODY -->
<div class="app-body">
  <!-- LISTS VIEW -->
  <div class="view active" id="viewLists">
    <div class="lists-view" id="listsContainer"></div>
  </div>

  <!-- VIDEOS VIEW -->
  <div class="view" id="viewVideos">
    <div class="videos-header" id="videosHeader"></div>
    <div class="sources-section" id="sourcesSection" style="display:none;">
      <div class="sources-toggle" onclick="toggleSources()">
        <span class="label" id="sourcesLabel">Playlists (0)</span>
        <span class="chevron" id="sourcesChevron">▼</span>
      </div>
      <div class="sources-body" id="sourcesBody"></div>
    </div>
    <div class="m-toolbar" id="toolbar"></div>
    <div class="videos-scroll" id="videosGrid"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-tab active" id="tabLists" onclick="switchView('lists')">
    <span class="nav-icon">☰</span>
    <span>Listes</span>
  </button>
  <button class="nav-tab" id="tabVideos" onclick="switchView('videos')">
    <span class="nav-icon">▶</span>
    <span>Vidéos</span>
  </button>
</div>

<!-- RENAME MODAL -->
<div class="modal-overlay" id="renameModal" onclick="if(event.target===this)closeModal('renameModal')">
  <div class="modal">
    <div class="sheet-handle"></div>
    <h3 id="renameModalTitle">Renommer</h3>
    <div class="modal-desc" id="renameModalDesc"></div>
    <input type="text" id="renameInput" placeholder="Nouveau nom…" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('renameModal')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmRename()">Renommer</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal" onclick="if(event.target===this)closeModal('confirmModal')">
  <div class="modal">
    <div class="sheet-handle"></div>
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <h3 id="confirmTitle">Confirmer</h3>
    <div class="modal-desc" id="confirmDesc">Êtes-vous sûr ?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('confirmModal')">Annuler</button>
      <button class="btn btn-danger" id="confirmActionBtn" onclick="confirmAction()">Supprimer</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h2>Paramètres <button class="close-btn" onclick="closeSettings()">✕</button></h2>

    <div class="setting-group">
      <h4>Thème</h4>
      <div class="theme-grid" id="themeGrid">
        <div class="theme-swatch" data-t="midnight" style="background:linear-gradient(135deg,#161920,#0d0f14);" onclick="setTheme('midnight')"><span>Nuit</span></div>
        <div class="theme-swatch" data-t="ocean" style="background:linear-gradient(135deg,#0f1f3d,#0a1628);" onclick="setTheme('ocean')"><span>Océan</span></div>
        <div class="theme-swatch" data-t="forest" style="background:linear-gradient(135deg,#142016,#0c1a0e);" onclick="setTheme('forest')"><span>Forêt</span></div>
        <div class="theme-swatch" data-t="purple" style="background:linear-gradient(135deg,#1a1428,#120e1c);" onclick="setTheme('purple')"><span>Violet</span></div>
        <div class="theme-swatch" data-t="light" style="background:linear-gradient(135deg,#fff,#f0f2f5);border:1px solid #d4d8de;" onclick="setTheme('light')"><span style="color:#333;">Clair</span></div>
      </div>
    </div>

    <div class="setting-group">
      <h4>Affichage</h4>
      <div class="setting-row"><div><label>Mode compact</label><div class="sub">Lignes plus petites</div></div><button class="toggle" id="toggleCompact" onclick="toggleSetting('compact')"></button></div>
      <div class="setting-row"><div><label>Sans miniatures</label><div class="sub">Texte uniquement</div></div><button class="toggle" id="toggleThumbs" onclick="toggleSetting('nothumbs')"></button></div>
      <div class="setting-row"><div><label>Confirmer suppression</label></div><button class="toggle on" id="toggleConfirm" onclick="toggleSetting('confirmDelete')"></button></div>
    </div>

    <div class="setting-group">
      <h4>Comportement</h4>
      <div class="setting-row"><div><label>Nouvel onglet</label><div class="sub">Ouvrir vidéos séparément</div></div><button class="toggle on" id="toggleNewTab" onclick="toggleSetting('newTab')"></button></div>
      <div class="setting-row"><div><label>Auto "vue" au clic</label><div class="sub">Marquer vue en ouvrant</div></div><button class="toggle" id="toggleAutoSeen" onclick="toggleSetting('autoSeen')"></button></div>
    </div>

    <div class="setting-group">
      <h4>Clé API YouTube</h4>
      <div class="api-key-setting">
        <input type="text" id="apiKeyInput" placeholder="AIza…" />
      </div>
    </div>

    <div class="setting-group">
      <h4>Données</h4>
      <div class="setting-row"><div><label>Exporter</label><div class="sub">Sauvegarde JSON</div></div><button class="btn btn-ghost btn-small" onclick="exportData()">Exporter</button></div>
      <div class="setting-row"><div><label>Importer</label><div class="sub">Restaurer un fichier</div></div><button class="btn btn-ghost btn-small" onclick="document.getElementById('importFile').click()">Importer</button><input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)" /></div>
      <div class="setting-row" style="margin-top:6px;"><div><label style="color:var(--danger);">Tout réinitialiser</label></div><button class="btn btn-danger btn-small" onclick="resetAllData()">Reset</button></div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let state = {
  apiKey: 'AIzaSyAkkpyaPxaniyNa9w3KQcXOvaehfVJKiWM',
  lists: [], activeListId: null,
  quotaUsed: 0, quotaDay: '',
  settings: { theme:'midnight', compact:false, nothumbs:false, confirmDelete:true, newTab:true, autoSeen:false }
};

const LS_KEY = 'playlisthub_state';
const QUOTA_MAX = 10000;
let filterPlaylistId = null, searchQuery = '', sortMode = 'date_desc';
let sourcesOpen = false;

function saveState() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

function loadState() {
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
    try {
      const p = JSON.parse(raw);
      state = { ...state, ...p };
      state.settings = { theme:'midnight',compact:false,nothumbs:false,confirmDelete:true,newTab:true,autoSeen:false, ...state.settings };
      for (const l of state.lists) {
        if (!l.seenVideoIds) l.seenVideoIds = [];
        if (l.playlists.length && typeof l.playlists[0] === 'string')
          l.playlists = l.playlists.map(id => ({ id, customName:'', originalName:'' }));
      }
    } catch(e) {}
  }
  const today = new Date().toISOString().slice(0,10);
  if (state.quotaDay !== today) { state.quotaUsed = 0; state.quotaDay = today; saveState(); }
}

// ===== VIEW SWITCHING =====
let currentView = 'lists';

function switchView(v) {
  currentView = v;
  document.getElementById('viewLists').classList.toggle('active', v === 'lists');
  document.getElementById('viewVideos').classList.toggle('active', v === 'videos');
  document.getElementById('tabLists').classList.toggle('active', v === 'lists');
  document.getElementById('tabVideos').classList.toggle('active', v === 'videos');
  if (v === 'videos') renderMain();
}

// ===== SETTINGS =====
function applySettings() {
  const s = state.settings;
  document.body.setAttribute('data-theme', s.theme);
  document.body.setAttribute('data-compact', s.compact);
  document.body.setAttribute('data-nothumbs', s.nothumbs);
  setToggle('toggleCompact', s.compact);
  setToggle('toggleThumbs', s.nothumbs);
  setToggle('toggleConfirm', s.confirmDelete);
  setToggle('toggleNewTab', s.newTab);
  setToggle('toggleAutoSeen', s.autoSeen);
  document.querySelectorAll('.theme-swatch').forEach(el => el.classList.toggle('active', el.dataset.t === s.theme));
}

function setToggle(id, val) { const el = document.getElementById(id); if (el) el.classList.toggle('on', val); }
function toggleSetting(k) { state.settings[k] = !state.settings[k]; saveState(); applySettings(); if (k==='compact'||k==='nothumbs') renderVideos(); }
function setTheme(t) { state.settings.theme = t; saveState(); applySettings(); }
function openSettings() { document.getElementById('settingsOverlay').classList.add('visible'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('visible'); }

function exportData() { const b = new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'playlisthub_backup.json'; a.click(); toast('Exporté !'); }
function importData(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { try { const i = JSON.parse(r.result); if (!i.lists) throw 0; state = {...state,...i}; state.settings = {theme:'midnight',compact:false,nothumbs:false,confirmDelete:true,newTab:true,autoSeen:false,...state.settings}; saveState(); applySettings(); renderSidebar(); renderMain(); renderQuota(); toast('Importé !'); } catch(e) { toast('Fichier invalide.'); } }; r.readAsText(f); e.target.value = ''; }
function resetAllData() { showConfirm('Tout réinitialiser','Toutes les données seront supprimées.','Réinitialiser', () => { localStorage.removeItem(LS_KEY); location.reload(); }); }

// ===== CONFIRM =====
let pendingConfirmAction = null;
function showConfirm(t,d,b,a) { document.getElementById('confirmTitle').textContent=t; document.getElementById('confirmDesc').textContent=d; document.getElementById('confirmActionBtn').textContent=b; pendingConfirmAction=a; document.getElementById('confirmModal').classList.add('visible'); }
function confirmAction() { closeModal('confirmModal'); if (pendingConfirmAction) { pendingConfirmAction(); pendingConfirmAction=null; } }
function smartConfirm(t,d,b,a) { state.settings.confirmDelete ? showConfirm(t,d,b,a) : a(); }

// ===== QUOTA =====
function addQuota(u) { state.quotaUsed += u; saveState(); renderQuota(); }
function renderQuota() {
  const rem = Math.max(0, QUOTA_MAX - state.quotaUsed);
  const pct = Math.min(100, (state.quotaUsed/QUOTA_MAX)*100);
  document.getElementById('quotaText').textContent = rem.toLocaleString();
  const bar = document.getElementById('quotaBar');
  bar.style.width = pct + '%';
  bar.className = 'quota-mini-fill' + (pct>90?' danger':pct>70?' warn':'');
}

// ===== YOUTUBE API =====
async function ytFetch(ep, p={}) { p.key=state.apiKey; const r = await fetch(`https://www.googleapis.com/youtube/v3/${ep}?${new URLSearchParams(p)}`); if (!r.ok) throw new Error(`API error: ${r.status}`); return r.json(); }

async function fetchPlaylistVideos(pid) {
  let vids=[], pt='', pTitle='';
  do {
    const p = {part:'snippet',playlistId:pid,maxResults:50}; if(pt) p.pageToken=pt;
    const d = await ytFetch('playlistItems',p); addQuota(1);
    for (const i of d.items) {
      if (i.snippet.resourceId.kind!=='youtube#video') continue;
      if (i.snippet.title==='Deleted video'||i.snippet.title==='Private video') continue;
      pTitle = pTitle || i.snippet.channelTitle;
      vids.push({ videoId:i.snippet.resourceId.videoId, title:i.snippet.title, thumb:i.snippet.thumbnails?.medium?.url||i.snippet.thumbnails?.default?.url||'', channel:i.snippet.videoOwnerChannelTitle||i.snippet.channelTitle||'', publishedAt:i.snippet.publishedAt||'', playlistId:pid, playlistTitle:i.snippet.channelTitle||pid });
    }
    pt = d.nextPageToken||'';
  } while(pt);
  return {videos:vids, playlistTitle:pTitle};
}

function extractPlaylistId(s) { s=s.trim(); if(/^PL[a-zA-Z0-9_-]+$/.test(s)) return s; const m=s.match(/[?&]list=([a-zA-Z0-9_-]+)/); return m?m[1]:null; }
function extractVideoId(s) { s=s.trim(); if(/^[a-zA-Z0-9_-]{11}$/.test(s)) return s; let m=s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1]; m=s.match(/(?:youtube\.com\/(?:watch\?.*v=|shorts\/))([a-zA-Z0-9_-]{11})/); return m?m[1]:null; }

async function fetchSingleVideo(vid) {
  const d = await ytFetch('videos',{part:'snippet',id:vid}); addQuota(1);
  if (!d.items?.length) throw new Error('Vidéo introuvable.');
  const s = d.items[0].snippet;
  return { videoId:vid, title:s.title, thumb:s.thumbnails?.medium?.url||s.thumbnails?.default?.url||'', channel:s.channelTitle||'', publishedAt:s.publishedAt||'', playlistId:'__singles__', playlistTitle:'Vidéos individuelles' };
}

// ===== HELPERS =====
function getPlaylistObj(l,id) { return l.playlists.find(p=>p.id===id); }
function gpdn(l,id) { const p=getPlaylistObj(l,id); return p?(p.customName||p.originalName||id):id; }
function getActiveList() { return state.lists.find(l=>l.id===state.activeListId)||null; }

function getFilteredVideos(l) {
  let v=[...l.videos];
  if (filterPlaylistId) v=v.filter(x=>x.playlistId===filterPlaylistId);
  if (searchQuery) { const q=searchQuery.toLowerCase(); v=v.filter(x=>x.title.toLowerCase().includes(q)||x.channel.toLowerCase().includes(q)); }
  if (sortMode==='date_desc') v.sort((a,b)=>(b.publishedAt||'').localeCompare(a.publishedAt||''));
  else if (sortMode==='date_asc') v.sort((a,b)=>(a.publishedAt||'').localeCompare(b.publishedAt||''));
  else if (sortMode==='title') v.sort((a,b)=>a.title.localeCompare(b.title));
  else if (sortMode==='channel') v.sort((a,b)=>a.channel.localeCompare(b.channel));
  else if (sortMode==='playlist') v.sort((a,b)=>gpdn(l,a.playlistId).localeCompare(gpdn(l,b.playlistId)));
  return v;
}

// ===== API KEY =====
const apiKeyInput = document.getElementById('apiKeyInput');
apiKeyInput.addEventListener('change', () => { state.apiKey=apiKeyInput.value.trim(); saveState(); validateApiKey(); });

async function validateApiKey() {
  if (!state.apiKey) { document.getElementById('apiDot').className='api-dot'; return; }
  try { await ytFetch('playlists',{part:'snippet',id:'PLrAXtmErZgOeiKm4sgNOknGvNjby9efdf',maxResults:1}); addQuota(1); document.getElementById('apiDot').className='api-dot ok'; }
  catch(e) { document.getElementById('apiDot').className='api-dot'; toast('Clé API invalide.'); }
}

// ===== LISTS =====
function createList() {
  const id='list_'+Date.now();
  state.lists.push({id, name:'Nouvelle liste', playlists:[], videos:[], seenVideoIds:[]});
  state.activeListId=id; filterPlaylistId=null; searchQuery='';
  saveState(); renderSidebar(); switchView('videos'); renderMain();
}

function selectList(id) {
  state.activeListId=id; filterPlaylistId=null; searchQuery='';
  saveState(); renderSidebar(); switchView('videos'); renderMain();
}

let renamingListId=null, renamingPlaylistId=null, currentModalMode='list';

function startRename(id) {
  renamingListId=id; currentModalMode='list';
  document.getElementById('renameInput').value = state.lists.find(l=>l.id===id).name;
  document.getElementById('renameModalTitle').textContent='Renommer la liste';
  document.getElementById('renameModalDesc').textContent='Choisissez un nom pour cette liste.';
  document.getElementById('renameModal').classList.add('visible');
  setTimeout(()=>document.getElementById('renameInput').focus(),150);
}

function startRenamePlaylist(pid) {
  renamingPlaylistId=pid; currentModalMode='playlist';
  const pl=getPlaylistObj(getActiveList(),pid);
  document.getElementById('renameInput').value=pl.customName||pl.originalName||'';
  document.getElementById('renameModalTitle').textContent='Renommer la playlist';
  document.getElementById('renameModalDesc').textContent='Ce nom remplacera le nom original.';
  document.getElementById('renameModal').classList.add('visible');
  setTimeout(()=>document.getElementById('renameInput').focus(),150);
}

function confirmRename() {
  const v=document.getElementById('renameInput').value.trim();
  if (!v) { closeModal('renameModal'); return; }
  if (currentModalMode==='list'&&renamingListId) { const l=state.lists.find(l=>l.id===renamingListId); if(l) l.name=v; }
  else if (currentModalMode==='playlist'&&renamingPlaylistId) { const p=getPlaylistObj(getActiveList(),renamingPlaylistId); if(p) p.customName=v; }
  saveState(); renderSidebar(); renderMain(); closeModal('renameModal');
}

document.getElementById('renameInput').addEventListener('keydown', e => { if(e.key==='Enter') confirmRename(); if(e.key==='Escape') closeModal('renameModal'); });

function deleteList(id) {
  const l=state.lists.find(x=>x.id===id);
  smartConfirm('Supprimer la liste',`La liste « ${l.name} » sera supprimée.`,'Supprimer', () => {
    state.lists=state.lists.filter(x=>x.id!==id);
    if(state.activeListId===id) state.activeListId=state.lists.length?state.lists[0].id:null;
    filterPlaylistId=null; saveState(); renderSidebar(); renderMain();
  });
}

function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

// ===== CONTENT =====
async function addContent() {
  const input=document.getElementById('playlistUrlInput');
  if (!input) return; const val=input.value.trim(); if(!val) return;
  const list=getActiveList(); if(!list) return;
  if (!state.apiKey) { toast('Clé API requise.'); return; }
  const plId=extractPlaylistId(val), vidId=extractVideoId(val);
  if (!plId&&!vidId) { toast('URL invalide.'); return; }

  input.disabled=true;
  const btn=document.getElementById('addBtn'); btn.innerHTML='<span class="spinner"></span>';

  try {
    if (plId) {
      if (list.playlists.some(p=>p.id===plId)) { toast('Déjà ajoutée.'); input.value=''; return; }
      const {videos,playlistTitle}=await fetchPlaylistVideos(plId);
      list.playlists.push({id:plId,customName:'',originalName:playlistTitle||plId});
      const ex=new Set(list.videos.map(v=>v.videoId)), seen=new Set(list.seenVideoIds);
      let n=0; for(const v of videos) { if(!ex.has(v.videoId)&&!seen.has(v.videoId)){list.videos.push(v);n++;} }
      saveState(); toast(`${n} vidéo(s) ajoutée(s).`);
    } else {
      const ex=new Set(list.videos.map(v=>v.videoId)), seen=new Set(list.seenVideoIds);
      if (ex.has(vidId)) { toast('Déjà dans la liste.'); input.value=''; return; }
      if (seen.has(vidId)) { toast('Déjà vue.'); input.value=''; return; }
      const video=await fetchSingleVideo(vidId); list.videos.push(video);
      if (!list.playlists.some(p=>p.id==='__singles__')) list.playlists.push({id:'__singles__',customName:'',originalName:'Vidéos individuelles'});
      saveState(); toast('Vidéo ajoutée !');
    }
    input.value=''; renderMain(); renderSidebar();
  } catch(e) { toast('Erreur: '+e.message); }
  finally { input.disabled=false; btn.textContent='OK'; }
}

function removePlaylist(pid) {
  const list=getActiveList(); if(!list) return;
  smartConfirm('Retirer la playlist',`« ${gpdn(list,pid)} » sera retirée.`,'Retirer', () => {
    list.playlists=list.playlists.filter(p=>p.id!==pid);
    list.videos=list.videos.filter(v=>v.playlistId!==pid);
    if(filterPlaylistId===pid) filterPlaylistId=null;
    saveState(); renderMain(); renderSidebar();
  });
}

async function refreshList() {
  const list=getActiveList(); if(!list||!state.apiKey) return;
  const real=list.playlists.filter(p=>p.id!=='__singles__');
  if (!real.length) { toast('Rien à rafraîchir.'); return; }
  const btn=document.getElementById('refreshBtn');
  btn.innerHTML='<span class="spinner"></span>'; btn.disabled=true;
  let n=0;
  try {
    const ex=new Set(list.videos.map(v=>v.videoId)), seen=new Set(list.seenVideoIds);
    for (const pl of list.playlists) {
      if(pl.id==='__singles__') continue;
      const {videos,playlistTitle}=await fetchPlaylistVideos(pl.id);
      if(playlistTitle&&!pl.originalName) pl.originalName=playlistTitle;
      for(const v of videos) { if(!ex.has(v.videoId)&&!seen.has(v.videoId)){list.videos.push(v);ex.add(v.videoId);n++;} }
    }
    saveState(); toast(n>0?`${n} nouvelle(s) vidéo(s) !`:'À jour.'); renderMain(); renderSidebar();
  } catch(e) { toast('Erreur: '+e.message); }
  finally { btn.innerHTML='↻'; btn.disabled=false; }
}

function toggleFilter(pid) { filterPlaylistId=(filterPlaylistId===pid)?null:pid; renderMain(); }
function toggleSources() { sourcesOpen=!sourcesOpen; document.getElementById('sourcesBody').classList.toggle('open',sourcesOpen); document.getElementById('sourcesChevron').classList.toggle('open',sourcesOpen); }
function onSearchInput(v) { searchQuery=v; renderVideos(); }
function onSortChange(v) { sortMode=v; renderVideos(); }

function openVideo(vid) {
  window.open('https://www.youtube.com/watch?v='+vid, state.settings.newTab?'_blank':'_self');
  if(state.settings.autoSeen) markSeen(vid);
}

function markSeen(vid) {
  const l=getActiveList(); if(!l) return;
  if(!l.seenVideoIds.includes(vid)) l.seenVideoIds.push(vid);
  l.videos=l.videos.filter(v=>v.videoId!==vid);
  saveState(); renderMain(); renderSidebar();
}

// ===== RENDERING =====
function renderSidebar() {
  const c=document.getElementById('listsContainer');
  let html = '<div class="section-title">Mes listes</div>';
  if (!state.lists.length) {
    html += '<div style="padding:24px;color:var(--text2);font-size:0.85rem;text-align:center;">Aucune liste pour le moment.</div>';
  } else {
    html += state.lists.map(l => `
      <div class="m-list-item ${l.id===state.activeListId?'active':''}" onclick="selectList('${l.id}')">
        <span class="name">${esc(l.name)}</span>
        <span class="badge">${l.videos.length}</span>
        <div class="item-actions">
          <button onclick="event.stopPropagation();startRename('${l.id}')">✏️</button>
          <button onclick="event.stopPropagation();deleteList('${l.id}')">🗑️</button>
        </div>
      </div>`).join('');
  }
  html += '<button class="add-list-btn" onclick="createList()">+ Nouvelle liste</button>';
  c.innerHTML = html;
}

function renderMain() {
  const list=getActiveList();
  const hdr=document.getElementById('videosHeader');
  const sec=document.getElementById('sourcesSection');

  if (!list) {
    hdr.innerHTML='<div class="empty-state" style="padding:16px;"><p style="font-size:0.85rem;color:var(--text2);">Sélectionnez une liste.</p></div>';
    sec.style.display='none';
    document.getElementById('toolbar').innerHTML='';
    document.getElementById('videosGrid').innerHTML='<div class="empty-state"><div class="icon">📺</div><p>Créez ou sélectionnez une liste dans l\'onglet Listes.</p></div>';
    return;
  }

  // Header
  hdr.innerHTML=`
    <div class="videos-header-top">
      <h2>${esc(list.name)}</h2>
    </div>
    <div class="add-input-row">
      <input type="text" id="playlistUrlInput" placeholder="URL playlist ou vidéo…" onkeydown="if(event.key==='Enter')addContent()" />
      <button id="addBtn" onclick="addContent()">OK</button>
    </div>`;

  // Sources
  if (list.playlists.length) {
    sec.style.display='block';
    document.getElementById('sourcesLabel').textContent=`Playlists (${list.playlists.length})`;
    document.getElementById('sourcesBody').innerHTML = list.playlists.map(pl => {
      const dn=pl.customName||pl.originalName||pl.id;
      const cnt=list.videos.filter(v=>v.playlistId===pl.id).length;
      const act=filterPlaylistId===pl.id;
      return `<span class="m-chip ${act?'active-filter':''}">
        <span class="chip-name" onclick="toggleFilter('${pl.id}')">${esc(dn)}</span>
        <span class="chip-count">${cnt}</span>
        <button onclick="event.stopPropagation();startRenamePlaylist('${pl.id}')">✏️</button>
        <button onclick="event.stopPropagation();removePlaylist('${pl.id}')">×</button>
      </span>`;
    }).join('');
  } else { sec.style.display='none'; }

  // Toolbar
  const seen=list.seenVideoIds.length;
  const filtered=getFilteredVideos(list);
  document.getElementById('toolbar').innerHTML=`
    <div class="info"><strong>${list.videos.length}</strong> vidéo${list.videos.length!==1?'s':''} ${seen?`<span style="opacity:0.5;">· ${seen} vue${seen!==1?'s':''}</span>`:''}</div>
    <div class="spacer"></div>
    <input type="text" placeholder="Rechercher…" value="${esc(searchQuery)}" oninput="onSearchInput(this.value)" />
    <select onchange="onSortChange(this.value)" id="sortSelect">
      <option value="date_desc">Récent</option>
      <option value="date_asc">Ancien</option>
      <option value="title">Titre</option>
      <option value="channel">Chaîne</option>
      <option value="playlist">Playlist</option>
    </select>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshList()">↻</button>`;

  const sel=document.getElementById('sortSelect'); if(sel) sel.value=sortMode;
  renderVideos();
}

function renderVideos() {
  const list=getActiveList(); if(!list) return;
  const grid=document.getElementById('videosGrid'); if(!grid) return;
  const filtered=getFilteredVideos(list);

  if (!filtered.length) {
    const msg=list.videos.length===0?(list.playlists.length?'Tout vu !':'Ajoutez du contenu ci-dessus.'):'Aucun résultat.';
    grid.innerHTML=`<div class="empty-state"><div class="icon">🎬</div><p>${msg}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(v => {
    const pdn=gpdn(list,v.playlistId);
    return `<div class="m-video">
      <div class="thumb" onclick="openVideo('${v.videoId}')">
        <img src="${esc(v.thumb)}" alt="" loading="lazy"/>
        <div class="play-ov"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="vinfo" onclick="openVideo('${v.videoId}')">
        <div class="vtitle">${hl(esc(v.title))}</div>
        <div class="vmeta">${hl(esc(v.channel))}${v.publishedAt?' · '+formatDate(v.publishedAt):''}</div>
        <span class="vtag">${esc(pdn)}</span>
      </div>
      <button class="seen-btn" onclick="event.stopPropagation();markSeen('${v.videoId}')">✓</button>
    </div>`;
  }).join('');
}

function hl(t) { if(!searchQuery) return t; const q=searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); return t.replace(new RegExp(`(${q})`,'gi'),'<mark style="background:rgba(242,92,84,0.3);color:inherit;border-radius:2px;padding:0 1px;">$1</mark>'); }
function formatDate(iso) { if(!iso) return ''; try{return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}catch(e){return '';} }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function toast(m) { const t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }

// ===== INIT =====
loadState();
apiKeyInput.value = state.apiKey || '';
applySettings();
renderQuota();
validateApiKey();
renderSidebar();
if (state.activeListId) { switchView('videos'); } else { renderMain(); }

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
